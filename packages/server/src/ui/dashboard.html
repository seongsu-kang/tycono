<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tycono Board</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 20px; }
  h1 { font-size: 1.4em; margin-bottom: 4px; color: #fff; }
  .subtitle { color: #888; font-size: 0.85em; margin-bottom: 20px; }
  .status-bar { display: flex; gap: 16px; margin-bottom: 20px; font-size: 0.85em; color: #aaa; }
  .status-bar .live { color: #4ade80; }
  .status-bar .cost { color: #facc15; }

  .board { display: flex; flex-direction: column; gap: 8px; }
  .task-row {
    display: grid; grid-template-columns: 50px 1fr 120px 100px 1fr 80px;
    align-items: center; padding: 12px 16px; background: #161616; border-radius: 8px;
    border-left: 4px solid #333; transition: all 0.2s;
  }
  .task-row:hover { background: #1e1e1e; }
  .task-row.running { border-left-color: #3b82f6; background: #161625; }
  .task-row.done { border-left-color: #22c55e; opacity: 0.7; }
  .task-row.skipped { border-left-color: #666; opacity: 0.5; }
  .task-row.blocked { border-left-color: #ef4444; }
  .task-row.waiting { border-left-color: #444; }

  .task-id { font-family: monospace; color: #888; font-size: 0.85em; }
  .task-title { font-weight: 500; }
  .task-assignee { color: #a78bfa; font-size: 0.85em; }
  .task-status { font-size: 0.85em; }
  .task-criteria { color: #888; font-size: 0.8em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .task-actions { display: flex; gap: 4px; }
  .task-actions button {
    padding: 4px 8px; font-size: 0.75em; border: 1px solid #333; background: #222;
    color: #ccc; border-radius: 4px; cursor: pointer; transition: all 0.15s;
  }
  .task-actions button:hover { background: #333; color: #fff; }
  .task-actions button.skip-btn:hover { border-color: #f59e0b; color: #f59e0b; }

  .status-icon { margin-right: 4px; }
  .header-row {
    display: grid; grid-template-columns: 50px 1fr 120px 100px 1fr 80px;
    padding: 8px 16px; font-size: 0.75em; color: #666; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .history { margin-top: 24px; }
  .history h3 { font-size: 0.9em; color: #888; margin-bottom: 8px; }
  .history-row { font-size: 0.8em; color: #666; padding: 4px 0; }
  .progress { margin-top: 16px; }
  .progress-bar { height: 4px; background: #222; border-radius: 2px; overflow: hidden; margin-top: 4px; }
  .progress-fill { height: 100%; background: #22c55e; transition: width 0.3s; }
  .progress-text { font-size: 0.8em; color: #888; margin-top: 4px; }

  .empty { text-align: center; padding: 60px; color: #555; }
  .empty h2 { font-size: 1.2em; margin-bottom: 8px; }

  .wave-selector { margin-bottom: 16px; }
  .wave-selector select { background: #1a1a1a; color: #ccc; border: 1px solid #333; padding: 6px 12px; border-radius: 4px; font-size: 0.85em; }
</style>
</head>
<body>

<h1>Tycono Board</h1>
<div class="subtitle" id="directive">Loading...</div>

<div class="status-bar">
  <span id="wave-id"></span>
  <span class="live" id="sse-status">Connecting...</span>
</div>

<div class="wave-selector">
  <select id="wave-select" onchange="loadWave(this.value)">
    <option value="">Select wave...</option>
  </select>
</div>

<div class="header-row">
  <span>ID</span><span>Task</span><span>Assignee</span><span>Status</span><span>Criteria</span><span>Actions</span>
</div>
<div class="board" id="board"></div>

<div class="progress">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="progress-text" id="progress-text"></div>
</div>

<div class="history" id="history-section" style="display:none">
  <h3>History</h3>
  <div id="history"></div>
</div>

<script>
const API = window.location.origin;
let currentWaveId = null;
let sseSource = null;

const statusIcons = {
  waiting: '<span class="status-icon">&#9203;</span>waiting',
  running: '<span class="status-icon">&#128260;</span>running',
  done: '<span class="status-icon">&#9989;</span>done',
  blocked: '<span class="status-icon">&#128683;</span>blocked',
  skipped: '<span class="status-icon">&#9197;</span>skipped',
};

async function loadActiveWaves() {
  try {
    const res = await fetch(`${API}/api/waves/active`);
    const data = await res.json();
    const waves = data.waves || data || [];
    const select = document.getElementById('wave-select');
    select.innerHTML = '<option value="">Select wave...</option>';
    waves.forEach(w => {
      const opt = document.createElement('option');
      opt.value = w.id;
      const dir = (w.directive || '').slice(0, 60);
      opt.textContent = `${w.id} — ${dir}`;
      select.appendChild(opt);
    });
    // Also check completed waves
    const ops = await fetch(`${API}/api/operations/waves`);
    const completed = await ops.json();
    (completed || []).slice(0, 10).forEach(w => {
      const opt = document.createElement('option');
      opt.value = w.id;
      opt.textContent = `${w.id} — ${(w.directive || '').slice(0, 60)} (done)`;
      select.appendChild(opt);
    });
    if (waves.length > 0 && !currentWaveId) {
      select.value = waves[0].id;
      loadWave(waves[0].id);
    }
  } catch (e) {
    console.error('Failed to load waves:', e);
  }
}

async function loadWave(waveId) {
  if (!waveId) return;
  currentWaveId = waveId;
  document.getElementById('wave-id').textContent = waveId;
  await renderBoard();
  connectSSE(waveId);
}

async function renderBoard() {
  if (!currentWaveId) return;
  try {
    const res = await fetch(`${API}/api/waves/${currentWaveId}/board`);
    if (!res.ok) {
      // No board — try to show wave summary from operations API
      await renderWaveSummary();
      return;
    }
    const board = await res.json();
    document.getElementById('directive').textContent = board.directive || '';

    const el = document.getElementById('board');
    el.innerHTML = board.tasks.map(t => `
      <div class="task-row ${t.status}" data-id="${t.id}">
        <span class="task-id">${t.id}</span>
        <span class="task-title">${esc(t.title)}</span>
        <span class="task-assignee">${t.assignee}</span>
        <span class="task-status">${statusIcons[t.status] || t.status}</span>
        <span class="task-criteria">${esc(t.criteria || '')}${t.dependsOn?.length ? ' (dep: ' + t.dependsOn.join(', ') + ')' : ''}</span>
        <span class="task-actions">
          ${t.status === 'waiting' ? `<button class="skip-btn" onclick="skipTask('${t.id}')">Skip</button>` : ''}
        </span>
      </div>
    `).join('');

    // Progress
    const done = board.tasks.filter(t => t.status === 'done' || t.status === 'skipped').length;
    const total = board.tasks.length;
    document.getElementById('progress-fill').style.width = total ? `${(done / total * 100)}%` : '0%';
    document.getElementById('progress-text').textContent = `${done}/${total} tasks complete`;

    // History
    if (board.history?.length) {
      document.getElementById('history-section').style.display = 'block';
      document.getElementById('history').innerHTML = board.history.map(h =>
        `<div class="history-row">${h.result === 'pass' ? '&#9989;' : '&#10060;'} ${h.taskId}: ${esc(h.note || '')} <span style="color:#555">(${h.agent})</span></div>`
      ).join('');
    }
  } catch (e) {
    console.error('Failed to load board:', e);
  }
}

function connectSSE(waveId) {
  if (sseSource) sseSource.close();
  const statusEl = document.getElementById('sse-status');
  try {
    sseSource = new EventSource(`${API}/api/waves/${waveId}/stream`);
    sseSource.onopen = () => { statusEl.textContent = 'Live'; };
    sseSource.onmessage = (e) => {
      // Re-render board on any event
      renderBoard();
    };
    sseSource.onerror = () => {
      statusEl.textContent = 'Disconnected';
      statusEl.style.color = '#888';
    };
  } catch {
    statusEl.textContent = 'No SSE';
  }
}

async function skipTask(taskId) {
  try {
    await fetch(`${API}/api/waves/${currentWaveId}/board/tasks/${taskId}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'skipped' }),
    });
    renderBoard();
  } catch (e) {
    alert('Failed to skip task: ' + e.message);
  }
}

async function renderWaveSummary() {
  // Show wave data from operations API (for waves without boards)
  try {
    const res = await fetch(`${API}/api/operations/waves/${currentWaveId}`);
    if (!res.ok) {
      document.getElementById('board').innerHTML = '<div class="empty"><h2>No data</h2><p>This wave has no board or saved data.</p></div>';
      document.getElementById('directive').textContent = '';
      document.getElementById('progress-fill').style.width = '0%';
      document.getElementById('progress-text').textContent = '';
      return;
    }
    const wave = await res.json();
    document.getElementById('directive').textContent = wave.directive || '';

    const roles = wave.roles || [];
    if (roles.length === 0) {
      document.getElementById('board').innerHTML = '<div class="empty"><h2>Wave (no board)</h2><p>This wave ran before Task Board was introduced.</p></div>';
      return;
    }

    // Render roles as a wave summary (not board tasks)
    const waveStatusMap = { done: 'done', streaming: 'running', running: 'running', error: 'blocked', unknown: 'waiting', awaiting_input: 'running' };
    const el = document.getElementById('board');
    const allRoles = [];
    roles.forEach(r => {
      allRoles.push(r);
      (r.childSessions || []).forEach(c => allRoles.push({ ...c, isChild: true }));
    });

    el.innerHTML = allRoles.map(r => {
      const status = waveStatusMap[r.status] || 'waiting';
      const indent = r.isChild ? '&nbsp;&nbsp;&#8627; ' : '';
      return `
        <div class="task-row ${status}">
          <span class="task-id">${indent}${r.roleId}</span>
          <span class="task-title">${esc(r.roleName || r.roleId)}</span>
          <span class="task-assignee">${r.isChild ? '(dispatched)' : 'C-Level'}</span>
          <span class="task-status">${statusIcons[status] || r.status}</span>
          <span class="task-criteria">${r.events ? r.events.length + ' events' : ''}</span>
          <span class="task-actions"></span>
        </div>`;
    }).join('');

    const done = allRoles.filter(r => r.status === 'done').length;
    document.getElementById('progress-fill').style.width = allRoles.length ? `${(done / allRoles.length * 100)}%` : '0%';
    document.getElementById('progress-text').textContent = `${done}/${allRoles.length} roles complete (wave summary — no board)`;
  } catch (e) {
    document.getElementById('board').innerHTML = '<div class="empty"><h2>No data</h2><p>Could not load wave data.</p></div>';
  }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Init
loadActiveWaves();
// Refresh wave list every 10s
setInterval(loadActiveWaves, 10000);
</script>

</body>
</html>
