# startup-mvp — Official Tycono Preset
# 초기 창업자를 위한 MVP 개발팀

spec: preset/v1
id: startup-mvp
name: "Startup MVP Team"
tagline: "From idea to launch in weeks"
version: "1.0.0"

description: |
  아이디어를 빠르게 MVP로 만들고 첫 사용자를 확보하기 위한 팀.
  린스타트업 방법론 + 기술 선택 가이드 + 빠른 실행에 최적화.
  "완벽한 제품"이 아닌 "학습을 위한 최소 제품"에 집중.

author:
  id: tycono
  name: "Tycono Official"
  verified: true

# 분류
category: engineering
industry: general
stage: idea
use_case:
  - mvp-development
  - rapid-prototyping
  - idea-validation

# 팀 구성 — Role ID만. 상세는 전사 roles/{id}/role.yaml
roles:
  - cto
  - engineer
  - pm

# Knowledge — 전사 AKB에 설치될 추천 문서 (번들 아님)
recommended_knowledge:
  - lean-startup.md
  - tech-stack-guide.md
  - mvp-checklist.md

# 가격 (Official = Free)
pricing:
  type: one-time
  price: 0
  wave_scoped_tier: pro

# 메타데이터
tags: [mvp, startup, lean, prototype, launch]
languages: [en, ko]

stats:
  installs: 0
  rating: 0
  reviews: 0
  waves_used: 0

# Wave-scoped 전용
wave_scoped:
  recommended_tasks:
    - "MVP 기능 설계"
    - "기술 스택 결정"
    - "프로토타입 개발"
    - "첫 사용자 확보 전략"
    - "랜딩페이지 제작"
  task_keywords: [mvp, prototype, tech-stack, launch, landing, idea, validation]
  avg_wave_duration: "2-6 hours"
  complexity: medium
