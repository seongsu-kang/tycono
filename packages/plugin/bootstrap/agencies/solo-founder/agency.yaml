# solo-founder — Official Tycono Preset
# All-in-One Team for Solo Founders

spec: preset/v1
id: solo-founder
name: "Solo Founder"
tagline: "Your AI co-founding team"
version: "1.0.0"

description: |
  Your AI co-founding team — built for solo builders who wear every hat.

  CBO designs your business strategy and revenue model, CTO architects the
  tech stack, Engineer writes the code, and Designer handles branding and UI.
  Four specialists working as one team, at the cost of an API call.

  Use this when you want to:
  - Turn a side project into a real business
  - Get strategy, development, and design done without hiring
  - Ship a landing page + MVP + GTM plan in a single session
  - Bootstrap from zero with no funding and no team

  What you get: Business plan, competitor analysis, landing page, MVP code, brand guide

author:
  id: tycono
  name: "Tycono Official"
  verified: true

# Classification
category: business
industry: general
stage: early
use_case:
  - solo-founder
  - side-project
  - bootstrapping

# Team — Role IDs only. Details in global roles/{id}/role.yaml
roles:
  - cto
  - cbo
  - engineer
  - designer

# Knowledge — Recommended docs to install in the company AKB (not bundled)
recommended_knowledge:
  - solo-playbook.md
  - revenue-models.md

# Pricing (Official = Free)
pricing:
  type: one-time
  price: 0
  wave_scoped_tier: pro

# Metadata
tags: [solo, founder, bootstrap, side-project, one-person]
languages: [en, ko]

stats:
  installs: 0
  rating: 0
  reviews: 0
  waves_used: 0

# Wave-scoped only
