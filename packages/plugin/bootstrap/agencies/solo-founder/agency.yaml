# solo-founder — Official Tycono Preset
# All-in-One Team for Solo Founders

spec: preset/v1
id: solo-founder
name: "Solo Founder"
tagline: "Your AI co-founding team"
version: "1.0.0"

description: |
  A team for founders building solo.
  AI handles strategy (CBO) + tech (CTO) + execution (Engineer) + design (Designer).
  End-to-end coverage from business planning to product launch.

author:
  id: tycono
  name: "Tycono Official"
  verified: true

# Classification
category: business
industry: general
stage: early
use_case:
  - solo-founder
  - side-project
  - bootstrapping

# Team — Role IDs only. Details in global roles/{id}/role.yaml
roles:
  - cto
  - cbo
  - engineer
  - designer

# Knowledge — Recommended docs to install in the company AKB (not bundled)
recommended_knowledge:
  - solo-playbook.md
  - revenue-models.md

# Pricing (Official = Free)
pricing:
  type: one-time
  price: 0
  wave_scoped_tier: pro

# Metadata
tags: [solo, founder, bootstrap, side-project, one-person]
languages: [en, ko]

stats:
  installs: 0
  rating: 0
  reviews: 0
  waves_used: 0

# Wave-scoped only
wave_scoped:
  recommended_tasks:
    - "Validate business idea"
    - "Design business model"
    - "Build landing page + MVP"
    - "Competitor analysis"
    - "GTM strategy"
    - "Branding + UI design"
  task_keywords: [business-model, landing, branding, competitor, gtm, pricing, design]
  avg_wave_duration: "3-8 hours"
  complexity: medium
