# solo-founder — Official Tycono Agency
# 혼자 일하는 창업자를 위한 올인원 팀

spec: agency/v1
id: solo-founder
name: "Solo Founder"
tagline: "Your AI co-founding team"
version: "1.0.0"

description: |
  혼자서 사업을 시작하는 창업자를 위한 팀.
  전략(CBO) + 기술(CTO) + 실행(Engineer) + 디자인(Designer)을 AI가 대신한다.
  사업 계획부터 제품 출시까지 원스톱.

author:
  id: tycono
  name: "Tycono Official"
  verified: true

# 분류
category: business
industry: general
stage: early
use_case:
  - solo-founder
  - side-project
  - bootstrapping

# 팀 구성 — Role ID만. 상세는 전사 roles/{id}/role.yaml
roles:
  - cto
  - cbo
  - engineer
  - designer

# Knowledge — 전사 AKB에 설치될 추천 문서 (번들 아님)
recommended_knowledge:
  - solo-playbook.md
  - revenue-models.md

# 가격 (Official = Free)
pricing:
  type: one-time
  price: 0
  wave_scoped_tier: pro

# 메타데이터
tags: [solo, founder, bootstrap, side-project, one-person]
languages: [en, ko]

stats:
  installs: 0
  rating: 0
  reviews: 0
  waves_used: 0

# Wave-scoped 전용
wave_scoped:
  recommended_tasks:
    - "사업 아이디어 검증"
    - "비즈니스 모델 설계"
    - "랜딩페이지 + MVP 개발"
    - "경쟁사 분석"
    - "GTM 전략 수립"
    - "브랜딩 + UI 디자인"
  task_keywords: [business-model, landing, branding, competitor, gtm, pricing, design]
  avg_wave_duration: "3-8 hours"
  complexity: medium
