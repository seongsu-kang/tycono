# gamedev — Official Tycono Preset
# Game Development Team

spec: preset/v1
id: gamedev
name: "Game Dev Team"
tagline: "From concept to playable game"
version: "1.0.0"

description: |
  A full game development team that takes you from concept to playable build.

  Say "build me a game" and the CTO picks the tech stack, PM writes the GDD,
  Engineer implements mechanics, Designer creates UI/HUD, and QA actually
  plays the game to find bugs and balance issues.

  Use this when you want to:
  - Turn a game idea into a working prototype over a weekend
  - Build a browser game for a game jam or hackathon
  - Iterate on game mechanics with real playtesting feedback
  - Create a polished demo with proper GDD documentation

  What you get: Playable game code + Game Design Document + QA playtest report
  Supports: Canvas, Phaser, pure JS/TS browser games

author:
  id: tycono
  name: "Tycono Official"
  verified: true

# Classification
category: engineering
industry: gamedev
stage: idea
use_case:
  - game-development
  - browser-game
  - mobile-game
  - prototyping

# Team — Role IDs only. Details in global roles/{id}/role.yaml
roles:
  - cto
  - pm
  - engineer
  - designer
  - qa

# Knowledge — Recommended docs to install in the company AKB
recommended_knowledge:
  - game-dev-guide.md
  - game-design-doc.md

# Pricing (Official = Free)
pricing:
  type: one-time
  price: 0
  wave_scoped_tier: pro

# Metadata
tags: [game, gamedev, canvas, phaser, unity, browser-game]
languages: [en, ko]

stats:
