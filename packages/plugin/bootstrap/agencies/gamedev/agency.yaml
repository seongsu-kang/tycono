# gamedev — Official Tycono Preset
# Game Development Team

spec: preset/v1
id: gamedev
name: "Game Dev Team"
tagline: "From concept to playable game"
version: "1.0.0"

description: |
  A specialized team for building browser/mobile games from concept to playtest.
  Focuses on game design documents (GDD), prototyping, and game balancing.
  Iterative testing and refinement to create games that are actually fun.

author:
  id: tycono
  name: "Tycono Official"
  verified: true

# Classification
category: engineering
industry: gamedev
stage: idea
use_case:
  - game-development
  - browser-game
  - mobile-game
  - prototyping

# Team — Role IDs only. Details in global roles/{id}/role.yaml
roles:
  - cto
  - pm
  - engineer
  - designer
  - qa

# Knowledge — Recommended docs to install in the company AKB
recommended_knowledge:
  - game-dev-guide.md
  - game-design-doc.md

# Pricing (Official = Free)
pricing:
  type: one-time
  price: 0
  wave_scoped_tier: pro

# Metadata
tags: [game, gamedev, canvas, phaser, unity, browser-game]
languages: [en, ko]

stats:
  installs: 0
  rating: 0
  reviews: 0
  waves_used: 0

# Wave-scoped only
wave_scoped:
  recommended_tasks:
    - "Game concept + GDD creation"
    - "Prototype development"
    - "Game mechanic implementation"
    - "UI/HUD design"
    - "Playtest + balancing"
  task_keywords: [game, gamedev, gdd, prototype, mechanic, balance, playtest, canvas, phaser]
  avg_wave_duration: "4-10 hours"
  complexity: high
