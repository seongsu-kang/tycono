# startup-mvp — Official Tycono Preset
# MVP Development Team for Early-Stage Founders

spec: preset/v1
id: startup-mvp
name: "Startup MVP Team"
tagline: "From idea to launch in weeks"
version: "1.0.0"

description: |
  The fastest path from idea to launched MVP.

  CTO makes tech decisions, Engineer builds it, PM keeps scope tight.
  Three roles, zero overhead — optimized for speed over perfection.
  This team follows lean startup methodology: build the smallest thing
  that lets you learn whether your idea works.

  Use this when you want to:
  - Validate an idea before investing serious time
  - Ship a working product in days, not months
  - Pick the right tech stack without analysis paralysis
  - Build just enough to get your first 10 users

  What you get: Scoped feature list, tech stack decision, working MVP code, launch checklist

author:
  id: tycono
  name: "Tycono Official"
  verified: true

# Classification
category: engineering
industry: general
stage: idea
use_case:
  - mvp-development
  - rapid-prototyping
  - idea-validation

# Team — Role IDs only. Details in global roles/{id}/role.yaml
roles:
  - cto
  - engineer
  - pm

# Knowledge — Recommended docs to install in the company AKB (not bundled)
recommended_knowledge:
  - lean-startup.md
  - tech-stack-guide.md
  - mvp-checklist.md

# Pricing (Official = Free)
pricing:
